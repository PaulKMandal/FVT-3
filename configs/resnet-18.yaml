version: "0.1"
name: cifar10_resnet18_full
task: classification
task_params:
  num_classes: 10
  input_size: 224

model:
  name: resnet18
  finetune_mode: full

dataset:
  name: cifar10
  path: ""

federation:
  mode: autonomous
  rounds: 3
  client_selection: [round_robin, 1.0]
  aggregation: average
  communication:
    send: full

federates:
  - id: client-01
    address: "0.0.0.0:9001"
  - id: client-02
    address: "0.0.0.0:9002"

hyperparams:
  learning_rate: 5e-5
  weight_decay: 0.0
  batch_size: 32
  local_epochs: 1
  optimizer: AdamW

evaluation:
  eval_every_round: 1
  metrics: [accuracy, loss]