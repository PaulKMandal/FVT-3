syntax = "proto3";
package fvt3;

option go_package = "fvt3pb";

// Federated training method used by this job.
enum Method {
  METHOD_UNSPECIFIED = 0; // Reserved for future methods (VFL/FTL/etc.)
  HFL = 1; // Horizontal Federated Learning.
}

// Per-client training hyperparameters for a single round.
message TrainSpec {
  int32 local_epochs = 1;   // Number of local epochs per round.
  float learning_rate = 2;  // Optimizer learning rate.
  int32 batch_size = 3;     // Mini-batch size.
}

// Differential privacy and (future) secure aggregation controls.
message Privacy {
  bool dp_enabled = 1;         // Enable DP-SGD.
  double target_epsilon = 2;   // Target privacy budget (epsilon).
  float clip_norm = 3;         // Gradient clipping norm.
  float noise_multiplier = 4;  // DP noise scale.
  bool secure_agg_enabled = 5; // Placeholder for secure aggregation.
}

// Orchestrator -> Server: initialize a run with a YAML manifest and privacy/method.
message InitRequest {
  string config_id = 1;     // Run/experiment identifier (stable across RPCs).
  string config_yaml = 2;   // Full YAML manifest (stringified).
  int64 timestamp_utc = 3;  // Unix seconds (UTC) when the request was sent.
  Method method = 4;        // Training method (default HFL).
  Privacy privacy = 5;      // Optional privacy configuration.
}

// Orchestrator -> Server: start a specific training round with global ref and knobs.
message StartRoundRequest {
  string config_id = 1;     // Run/experiment id (must match InitRequest.config_id).
  int32 round_id = 2;       // 0-based round index (r0, r1, ...).
  string global_ref = 3;    // Path/URI to base weights or adapter for this round.
  TrainSpec train_spec = 4; // Per-round local training settings.
}

// Generic acknowledgement/result for control-plane RPCs.
message Ack {
  string id = 1;               // Server id (if known); may be empty on first contact.
  int64 received_timestamp = 2;// Server-side Unix seconds when the request was received.
  string status = 3;           // "ok" or "error".
  string note = 4;             // Optional human-readable note or error details.
}

// Server -> Orchestrator: registration with capabilities and dataset size.
message RegisterRequest {
  string id = 1;                 // Server identifier (operator- or system-assigned).
  int64 reported_n_samples = 2;  // Local dataset size for weighting/selection.
  string device = 3;             // e.g., "cuda:0" or "cpu".
  string data_path = 4;          // Optional informational path/label.
  int64 timestamp_utc = 5;       // Client-side Unix seconds (UTC) for registration event.
}

// Registration response/acknowledgement.
message RegisterResponse {
  string status = 1; // "ok" or "error".
  string note = 2;   // Optional message for operators.
}

// Upload chunks (client-streaming). Supports checksums and sequence numbers.
message UploadChunk {
  string id = 1;               // Server id.
  string artifact_id = 2;      // Logical name (e.g., "lora_r1_client01", "full_ckpt_r1").
  int64 seq = 3;               // 0-based chunk index.
  bytes data = 4;              // Payload bytes.
  bool final_chunk = 5;        // True if this is the last chunk.
  string chunk_sha256 = 6;     // Optional per-chunk checksum (hex).
}

// Upload response/receipt.
message UploadResponse {
  string status = 1;         // "ok" or "error".
  string artifact_ref = 2;   // Orchestrator-side reference/path for the stored artifact.
  string note = 3;           // Optional diagnostic or guidance.
}

// Services:
// - ServerService: implemented by each federate server; orchestrator calls Init on it.
// - OrchestratorService: implemented by orchestrator; servers call Register and UploadModel.

service Server {
  // Initialize server with run configuration and privacy settings.
  rpc Init(InitRequest) returns (Ack);

  // Start a specific training round with global model reference and training knobs.
  rpc StartRound(StartRoundRequest) returns (Ack);
}

// Orchestrator service -> servers call Register and UploadModel.
service Orchestrator {
  // Register a server and report capabilities and dataset size.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Upload a model artifact as a stream of chunks.
  rpc UploadModel(stream UploadChunk) returns (UploadResponse);
}
